name: Musopti
options:
  bundleIdPrefix: com.musopti
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Musopti needs Bluetooth to connect to your training module."

targets:
  Musopti:
    type: application
    platform: iOS
    sources:
      - path: Musopti
        excludes:
          - "**/.gitkeep"
    resources:
      - path: Musopti/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.musopti.app
        DEVELOPMENT_TEAM: "AJSF8Z4YWZ"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Musopti
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
    entitlements:
      path: Musopti/Musopti.entitlements
      properties: {}

  MusoptiAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MusoptiAppTests
    dependencies:
      - target: Musopti
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.musopti.app.apptests
        GENERATE_INFOPLIST_FILE: true
